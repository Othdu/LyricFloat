name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # CRITICAL: each flavor gets its OWN obj/bin cache. With a shared
      # cache, MSBuild's incremental build reuses the first flavor's exe -
      # including its embedded manifest - and silently ignores the
      # UiAccessBuild switch. That shipped a valorant zip without uiAccess.

      # Standard build: works everywhere except Valorant, zero setup.
      - name: Publish (standard)
        run: >
          dotnet publish src/LyricFloat -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:BaseIntermediateOutputPath=obj-standard/
          -p:BaseOutputPath=bin-standard/
          -o out/standard

      # Valorant build: uiAccess manifest + local install script.
      - name: Publish (Valorant / uiAccess)
        run: >
          dotnet publish src/LyricFloat -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:UiAccessBuild=true
          -p:BaseIntermediateOutputPath=obj-valorant/
          -p:BaseOutputPath=bin-valorant/
          -o out/valorant

      - name: Stage release assets
        shell: pwsh
        run: |
          # Wrap each build in a LyricFloat/ folder so "Extract Here" on a
          # Desktop produces one tidy folder instead of loose files.
          New-Item -ItemType Directory pkg-standard/LyricFloat, pkg-valorant/LyricFloat -Force | Out-Null
          Move-Item out/standard/* pkg-standard/LyricFloat/
          Move-Item out/valorant/* pkg-valorant/LyricFloat/
          Copy-Item scripts/install-uiaccess.ps1 pkg-valorant/LyricFloat/
          Copy-Item docs/VALORANT-SETUP.txt pkg-valorant/LyricFloat/README.txt
          Compress-Archive -Path pkg-standard/LyricFloat -DestinationPath "LyricFloat-${{ github.ref_name }}-standard-win-x64.zip"
          Compress-Archive -Path pkg-valorant/LyricFloat -DestinationPath "LyricFloat-${{ github.ref_name }}-valorant-win-x64.zip"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LyricFloat-*-standard-win-x64.zip
            LyricFloat-*-valorant-win-x64.zip
          generate_release_notes: true
